# Job Hunt Targets — verified ATS slugs as of May 2026
# ats: greenhouse | lever | ashby | amazon | workday | manual
# Slugs marked ✓ are confirmed working against the live API.
# tc_range: only the top of the range feeds scoring (score.py takes the max);
# the full range is shown as-is when a posting carries no real salary.

tier_a:
  name: "FAANG ($340–750K TC NYC)"
  companies:
    - name: Meta
      ats: manual
      url: https://metacareers.com/jobs/?roles[0]=full-time
      tc_range: "340-750K"

    - name: Google
      ats: manual
      url: https://careers.google.com/jobs/results/?employment_type=FULL_TIME&location=New+York
      tc_range: "340-700K"

    - name: Amazon
      ats: amazon              # ✓ public JSON endpoint (includes AWS, Alexa, Prime Video)
      tc_range: "300-650K"

    - name: Apple
      ats: manual              # No clean public API as of May 2026
      url: https://jobs.apple.com/en-us/search?location=new-york-NYCGR&team=software-and-services-SWDV
      tc_range: "300-600K"

    - name: Microsoft
      ats: manual              # New apply.careers.microsoft.com SPA requires login
      url: https://careers.microsoft.com/us/en/search-results?keywords=senior+software+engineer&location=New+York
      tc_range: "300-600K"

    - name: NVIDIA
      ats: workday             # ✓ public Workday CXS endpoint
      workday:
        host:   nvidia.wd5
        tenant: nvidia
        site:   NVIDIAExternalCareerSite
      tc_range: "350-700K"

    - name: Netflix
      ats: netflix             # ✓ Eightfold ATS public positions API (added Jun 2026)
      tc_range: "450-900K"

