  - Terraform
  - CI/CD
  - LLM
  - RAG
  - prompt engineering

# ── Preferences ───────────────────────────────────────────────────────────────
# Drives the location filter and the daily brief, plus which job sources run.
preferences:
  home_terms:   [austin, "austin, tx"]   # city/borough strings that always pass
  home_states:  [TX]                      # 2-letter codes that count as "local"
  allow_remote: true
  remote_scope: us                        # us = US-wide remote ok | anywhere | none
  enable_jobspy: false                    # Indeed/Google scrape: off by default (noisy, heavy deps)
  enable_adzuna: false                    # Adzuna aggregator (free key in briefing.conf) — broad coverage
  enable_remotive: false                  # Remotive remote-jobs board (free, no key)
  brief_delivery: auto                    # auto | telegram | email | both | none (creds go in briefing.conf)
  publish: false                          # push a dashboard snapshot to Turso for a web /admin

# ── Scoring (optional) ────────────────────────────────────────────────────────
# Override per-category skill weights. Delete this whole block to use the
# defaults in config.py (which lean AI/ML-heavy). A backend-focused candidate
# might rebalance like this:
scoring:
  category_weights:
    backend:      3.0
    architecture: 2.5
    cloud_devops: 2.0
    leadership:   2.0
    ai_ml:        1.5

# ── Company aliases (optional) ────────────────────────────────────────────────
# Collapse sub-brands / aggregator spellings onto one canonical employer.
company_aliases:
  amazon.com:          Amazon
  aws:                 Amazon
  amazon web services: Amazon

# ── Interview prep (optional) ─────────────────────────────────────────────────
# Per-company notes surfaced by the jobhunt_prep tool. Anything not listed here
# falls back to a generic senior-SWE guide.
prep:
  Stripe: |
    **Stripe Interview Prep**
    • Process: Recruiter, coding screen, then a 4-round onsite.
    • Focus: API design, distributed transactions, reliability.
    • Questions to ask: How does Stripe balance iteration speed with API stability?
