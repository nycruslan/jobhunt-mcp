# Your profile — copy this file to profile.yaml and make it yours.
# It is the single source of truth: résumé, identity, location, and tuning.
# profile.yaml is git-ignored so your real data never gets committed.

contact:
  name: Jordan Lee
  location: Austin, TX
  email: jordan.lee@example.com
  phone: "(512) 555-0182"
  linkedin: linkedin.com/in/jordanlee
  portfolio: jordanlee.dev          # optional — remove if you don't have one

# Top-of-page value prop. First thing a recruiter reads. Write it like a human:
# varied sentence lengths, no em dashes, no buzzwords.
summary: >-
  Senior backend engineer with eight years building payment and data systems.
  I work mostly in Python and Go on high-throughput services. Recently led the
  rewrite of a billing pipeline that cut reconciliation errors by about 40%.

# Used by the cover-letter and referral drafts.
target_roles:
  - Senior Software Engineer
  - Staff Software Engineer
  - Backend Engineer
  - Platform Engineer

experience:
  - company: Acme Payments
    location: Austin, TX
    title: Senior Software Engineer
    start: 2021-03
    end: present
    bullets:
      - Rebuilt the billing reconciliation pipeline in Go. Cut error rates by roughly 40% and shaved nightly batch time from 6 hours to under 90 minutes.
      - Led a 4-engineer team owning the payments API. Set the on-call rotation and the design-review bar.
      - Moved core services onto Kubernetes with blue-green deploys, which took release rollbacks from 20 minutes to seconds.
  - company: Northwind Data
    location: Remote
    title: Software Engineer
    start: 2017-06
    end: 2021-03
    bullets:
      - Built ingestion services handling about 2B events a day on Kafka and Postgres.
      - Wrote the internal SDK most product teams now use to publish metrics.

education:
  - institution: University of Texas at Austin
    location: Austin, TX
    degree: B.S. Computer Science
    start: 2013-08
    end: 2017-05

# Skills, grouped by category. The category keys line up with scoring weights
# (see `scoring` below and config.py for the defaults). Drop categories you
# don't have; unknown categories just score at weight 1.0.
skills:
  ai_ml:
    - LLM integration
    - RAG pipelines
    - prompt engineering
  architecture:
    - distributed systems
    - microservices
    - event-driven design
    - system design
    - API design
  backend:
    - Python
    - Go
    - PostgreSQL
    - Kafka
    - REST APIs
    - gRPC
  cloud_devops:
    - AWS
    - Docker
    - Kubernetes
    - Terraform
    - CI/CD
  leadership:
    - technical mentorship
    - on-call leadership
    - cross-team coordination

# Flat list used for keyword matching against job descriptions. Keep it in sync
# with the skills above, plus any synonyms a JD might use.
all_skills_flat:
  - Python
  - Go
  - PostgreSQL
  - Kafka
  - gRPC
  - REST
  - microservices
  - distributed systems
  - event-driven
  - system design
  - API design
  - AWS
